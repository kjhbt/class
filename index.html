<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3학년 창의적 체험활동 기록</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#F2F5F3; --surface:#FFFFFF; --surface-2:#F8FAF9;
  --ink:#16211D; --muted:#5C6B65; --faint:#8B978F;
  --line:#DDE4E0; --line-2:#C6D0CB;
  --auto:#0E7C6B; --auto-soft:#E4F2EE; --auto-ink:#0A5B4F;
  --career:#4A55C4; --career-soft:#E9EBFB; --career-ink:#333DA0;
  --warn:#C2531F; --danger:#B23636; --ok:#0E7C6B; --gold:#B8862B;
  --shadow:0 1px 2px rgba(20,33,29,.05),0 8px 24px -12px rgba(20,33,29,.18);
  --shadow-lg:0 24px 60px -28px rgba(20,33,29,.45);
  --r:12px; --r-sm:8px;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Pretendard','Pretendard Variable',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.55;font-size:15px;
  background-image:linear-gradient(rgba(14,124,107,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(14,124,107,.035) 1px,transparent 1px);
  background-size:26px 26px;}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink)}
a{color:var(--auto)}
::selection{background:var(--auto-soft)}
.mono{font-family:var(--mono)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:500}
.btn{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);padding:9px 15px;border-radius:var(--r-sm);font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--ink);transform:translateY(-1px)}
.btn.primary{background:var(--auto);border-color:var(--auto);color:#fff}
.btn.primary:hover{background:var(--auto-ink);border-color:var(--auto-ink)}
.btn.career{background:var(--career);border-color:var(--career);color:#fff}
.btn.career:hover{background:var(--career-ink);border-color:var(--career-ink)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{background:var(--surface-2);border-color:var(--line);color:var(--ink)}
.btn.danger{color:var(--danger);border-color:transparent;background:transparent}
.btn.danger:hover{background:#fbeaea;border-color:#f0cfcf}
.btn.sm{padding:5px 10px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;line-height:1.6}
.badge.auto{background:var(--auto-soft);color:var(--auto-ink)}
.badge.career{background:var(--career-soft);color:var(--career-ink)}
.badge.both{background:linear-gradient(90deg,var(--auto-soft),var(--career-soft));color:var(--ink)}
.badge.muted{background:var(--surface-2);color:var(--muted);border:1px solid var(--line)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.auto{background:var(--auto)} .dot.career{background:var(--career)}
.topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.86);backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 22px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand .mark{font-family:var(--mono);font-weight:600;font-size:13px;color:#fff;background:var(--ink);padding:5px 9px;border-radius:7px;white-space:nowrap}
.brand .ttl{font-weight:700;font-size:15px;letter-spacing:-.01em;white-space:nowrap}
.brand .sub{font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap}
.topbar .spacer{flex:1}
.topbar .status{font-family:var(--mono);font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.topbar .status .led{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.topbar .status.on .led{background:var(--ok);box-shadow:0 0 0 3px rgba(14,124,107,.15)}
.topbar .status.local .led{background:var(--gold);box-shadow:0 0 0 3px rgba(184,134,43,.15)}
.who-chip{font-family:var(--mono);font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--line);border-radius:20px}
.wrap{max-width:1240px;margin:0 auto;padding:26px 22px 90px}
.setup{max-width:1240px;margin:14px auto 0;padding:0 22px}
.setup .card{background:#fffdf4;border:1px solid #ecdca4;border-radius:var(--r);padding:14px 16px;display:flex;gap:13px;align-items:flex-start}
.setup .card h4{margin:0 0 3px;font-size:14px}.setup .card p{margin:0;font-size:13px;color:var(--muted)}.setup .card .ico{font-size:18px}
.hero{text-align:center;padding:40px 0 26px}
.hero .eyebrow{margin-bottom:14px}
.hero h1{font-size:clamp(27px,4.2vw,42px);margin:0 0 12px;letter-spacing:-.03em;line-height:1.1}
.hero h1 em{font-style:normal;color:var(--auto)}
.hero p{color:var(--muted);max-width:560px;margin:0 auto;font-size:15.5px}
.gate{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:960px;margin:32px auto 0}
.gate.gate2{grid-template-columns:repeat(2,1fr);max-width:720px}
@media(max-width:760px){.gate{grid-template-columns:1fr}}
.sup-link{max-width:440px;margin:14px auto 0;text-align:center}
.sup-link button{background:none;border:none;color:var(--faint);font-size:12.5px;font-family:var(--mono);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.sup-link button:hover{color:var(--gold)}
.gate .opt{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:24px 22px;text-align:left;transition:.18s;position:relative;overflow:hidden}
.gate .opt:hover{border-color:var(--line-2);transform:translateY(-3px);box-shadow:var(--shadow)}
.gate .opt .k{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.12em}
.gate .opt h3{margin:8px 0 6px;font-size:19px;letter-spacing:-.01em}
.gate .opt p{margin:0 0 18px;color:var(--muted);font-size:13px;min-height:54px}
.gate .opt .edge{position:absolute;left:0;top:0;bottom:0;width:4px}
.gate .opt.stu .edge{background:var(--auto)}.gate .opt.tea .edge{background:var(--career)}.gate .opt.sup .edge{background:var(--gold)}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.panel .head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.panel .head h2{margin:0;font-size:17px;letter-spacing:-.01em}.panel .head .spacer{flex:1}
.select,.inp,.ta{width:100%;border:1px solid var(--line-2);border-radius:var(--r-sm);padding:10px 12px;background:var(--surface-2);transition:.14s;resize:vertical}
.inp:focus,.ta:focus,.select:focus{outline:none;border-color:var(--auto);background:#fff;box-shadow:0 0 0 3px rgba(14,124,107,.12)}
.ta{min-height:96px;line-height:1.6}.ta.big{min-height:132px}
.ta:disabled,.inp:disabled{background:#f0f2f1;color:var(--muted);cursor:not-allowed}
.login{max-width:440px;margin:30px auto 0}
.login .panel{padding:24px}
.login h2{margin:0 0 4px;font-size:20px}
.login .sub{color:var(--muted);font-size:13.5px;margin:0 0 18px}
.login .field{margin-bottom:14px}
.login label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
.login .row{display:flex;gap:10px}
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
.stu-chip{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);padding:11px 13px;text-align:left;transition:.14s;display:flex;align-items:center;gap:10px}
.stu-chip:hover{border-color:var(--auto);background:var(--auto-soft);transform:translateY(-2px)}
.stu-chip .no{font-family:var(--mono);font-size:12px;color:var(--faint);min-width:22px}
.stu-chip .nm{font-weight:600;font-size:14.5px}
.stu-chip .lk{margin-left:auto;font-size:12px;opacity:.5}
.ws{display:grid;grid-template-columns:minmax(0,1fr) 366px;gap:22px;align-items:start}
@media(max-width:1080px){.ws{grid-template-columns:1fr}}
.ws-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.ws-head .who{display:flex;align-items:center;gap:12px}
.ws-head .avatar{width:44px;height:44px;border-radius:11px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:700;font-size:16px}
.ws-head .who .nm{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
.ws-head .who .meta{font-family:var(--mono);font-size:11.5px;color:var(--faint)}
.ws-head .spacer{flex:1}
.tabstrip{display:flex;gap:4px;align-items:flex-end;border-bottom:2px solid var(--line);padding:0 2px;min-width:0}
.tab-scroll{display:flex;gap:4px;align-items:flex-end;flex:1 1 auto;min-width:0;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin}
.tab-scroll::-webkit-scrollbar{height:6px}
.tab-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px}
.tabstrip>.tab{flex:0 0 auto}
.tab-grp{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);align-self:center;padding:0 6px 6px 8px;display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;flex:0 0 auto;white-space:nowrap}
.career-bar{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,var(--auto-soft),#fff);border:1px solid var(--line);border-left:4px solid var(--auto);border-radius:var(--r-sm);padding:11px 15px;margin-bottom:16px}
.career-bar .cl{font-weight:700;font-size:13px;color:var(--auto-ink);white-space:nowrap;letter-spacing:-.01em}
.career-bar .career-f{flex:1;background:#fff;margin:0}
.career-bar .saveind{white-space:nowrap}
.tab{border:1px solid var(--line);border-bottom:none;background:var(--surface-2);padding:9px 14px 10px;border-radius:9px 9px 0 0;font-weight:600;font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:8px;position:relative;top:2px;transition:.14s;max-width:230px}
.tab:hover{color:var(--ink);background:var(--surface)}
.tab.active{background:var(--surface);color:var(--ink);border-color:var(--line);box-shadow:0 -3px 0 0 var(--tabc,var(--auto)) inset;border-bottom:2px solid var(--surface)}
.tab .tno{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.tab .tt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab .x{opacity:.4;font-size:15px;line-height:1;margin-left:2px}
.tab .x:hover{opacity:1;color:var(--danger)}
.tab.add{color:var(--auto);border-style:dashed;background:transparent}
.tab.add:hover{background:var(--auto-soft)}
.tab.books{--tabc:var(--gold)}
.tabbody{background:var(--surface);border:1px solid var(--line);border-top:none;border-radius:0 0 var(--r) var(--r);padding:22px 24px;box-shadow:var(--shadow);min-height:340px}
.rec-title{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.field{margin-top:16px}
.field > label{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.field > label .l{font-weight:600;font-size:13.5px}
.field > label .hint{font-family:var(--mono);font-size:11px;color:var(--faint)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
.book-sec h4{display:flex;align-items:center;gap:8px;font-size:14px;margin:20px 0 10px}
.book-sec:first-child h4{margin-top:2px}
.book-row{display:grid;grid-template-columns:1.1fr 1.4fr auto;gap:10px;align-items:center;margin-bottom:8px}
@media(max-width:600px){.book-row{grid-template-columns:1fr}}
.book-row .inp{background:#fff}
.empty{color:var(--faint);font-size:13px;font-style:italic;padding:6px 2px}
.pick-sec{margin-bottom:22px}
.pick-sec h4{font-size:14px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
.pick-sec .desc{font-size:12.5px;color:var(--muted);margin:0 0 12px}
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:640px){.pick-grid{grid-template-columns:1fr}}
.pick-card{border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 13px;display:flex;flex-direction:column;gap:6px;text-align:left;transition:.14s;background:var(--surface-2)}
.pick-card.added{opacity:.55;background:var(--surface);cursor:not-allowed}
.pick-card.added .pt{color:var(--muted)}
.pick-card:hover{border-color:var(--auto);background:#fff;transform:translateY(-2px);box-shadow:var(--shadow)}
.pick-card .pt{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;justify-content:space-between}
.pick-card .pc{font-size:12px;color:var(--muted);line-height:1.5}
.pick-card .pm{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:2px}
.divider{height:1px;background:var(--line);margin:22px 0}
.custom-add{display:grid;grid-template-columns:1fr 130px auto;gap:10px;align-items:end}
@media(max-width:640px){.custom-add{grid-template-columns:1fr}}
.counsel-col{position:sticky;top:76px;display:flex;flex-direction:column;gap:14px}
.link-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px}
.notif-slot{flex:1 1 auto;min-width:0;display:flex;align-items:center}
.notif-empty{font-size:12px;color:var(--faint);font-family:var(--mono)}
.notif-box{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;background:var(--auto-soft);border:1px solid var(--auto);border-radius:12px;padding:7px 12px}
.notif-ic{font-size:15px}
.notif-t{font-weight:700;font-size:13px;color:var(--auto-ink);white-space:nowrap}
.notif-names{display:flex;gap:6px;flex-wrap:wrap;flex:1 1 auto;min-width:0}
.notif-name{background:#fff;border:1px solid var(--auto);color:var(--auto-ink);border-radius:20px;padding:3px 11px;font-size:12.5px;font-weight:600;cursor:pointer}
.notif-name:hover{background:var(--auto);color:#fff}
.notif-more{align-self:center;font-size:12px;color:var(--muted)}
.notif-ack{margin-left:auto;white-space:nowrap}
@media(max-width:680px){ .notif-slot{order:5;flex:1 1 100%} .notif-box{margin-top:8px} }
.counsel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.counsel .ch{padding:14px 17px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,var(--surface-2));display:flex;align-items:center;gap:9px}
.counsel .ch .ci{width:26px;height:26px;border-radius:7px;background:var(--career);color:#fff;display:grid;place-items:center;font-size:13px}
.counsel .ch h3{margin:0;font-size:15px;letter-spacing:-.01em}
.counsel .ch .cs{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto}
.counsel .cb{padding:15px 17px;max-height:calc(100vh - 210px);overflow:auto}
.counsel .csec{margin-bottom:16px}.counsel .csec:last-child{margin-bottom:4px}
.counsel .csec > label{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;margin-bottom:6px}
.counsel .ta{min-height:84px;font-size:14px}
.counsel .ftr{padding:11px 17px;border-top:1px solid var(--line);display:flex;gap:8px;background:var(--surface-2)}
.counsel-note{font-size:11.5px;color:var(--faint);padding:0 17px 13px;line-height:1.5}
.link-box{padding:12px 17px;border-top:1px solid var(--line);background:var(--surface-2)}
.link-box .link-t{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.link-btn{display:flex;align-items:center;gap:7px;text-decoration:none;font-weight:600;font-size:13px;color:var(--ink);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 12px;background:#fff;transition:.14s;margin-bottom:7px}
.link-btn:last-child{margin-bottom:0}
.link-btn:hover{border-color:var(--auto);color:var(--auto-ink);transform:translateY(-1px)}
.counsel.locked .ch .ci{background:var(--faint)}
.lockchip{font-family:var(--mono);font-size:10px;color:var(--warn);border:1px solid #eccdaf;background:#fdf5ec;border-radius:20px;padding:2px 8px}
.admin-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.atab{padding:8px 15px;border-radius:20px;border:1px solid var(--line);background:var(--surface);font-weight:600;font-size:13.5px;color:var(--muted);transition:.14s}
.atab:hover{border-color:var(--line-2);color:var(--ink)}
.atab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.a-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px}
.a-stu{border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;background:var(--surface);display:flex;flex-direction:column;gap:9px}
.a-stu .top{display:flex;align-items:center;gap:9px}
.a-stu .no{font-family:var(--mono);font-size:11px;color:var(--faint)}
.a-stu .nm{font-weight:700;font-size:15px}
.a-stu .open{margin-left:auto}
.a-stu .bars{display:flex;gap:10px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.a-stu .pill{display:inline-flex;align-items:center;gap:5px}
.a-stu .barwrap{height:5px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.a-stu .bar{height:100%;background:var(--auto)}
.a-stu .pw{display:flex;align-items:center;gap:7px;border-top:1px dashed var(--line);padding-top:9px}
.a-stu .pw label{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap}
.a-stu.st-green{border-left:4px solid var(--auto)}
.a-stu.st-red{border-left:4px solid #d9534f;background:#fdf6f6}
.a-stu.st-blue{border-left:4px solid #3b5bdb;background:#f4f7ff;box-shadow:0 0 0 1px #c7d2fb}
.a-stu .chgdot{font-family:var(--mono);font-size:10.5px;font-weight:700;color:#3b5bdb;background:#e7ecfe;border-radius:20px;padding:2px 8px;margin-left:6px}
.lgd{display:inline-flex;align-items:center;gap:5px}
.lgdbox{width:12px;height:12px;border-radius:3px;border:1px solid var(--line)}
.lgdbox.st-green{border-left:4px solid var(--auto)}
.lgdbox.st-red{border-left:4px solid #d9534f;background:#fdf6f6}
.lgdbox.st-blue{border-left:4px solid #3b5bdb;background:#f4f7ff}
.a-stu .pw input{flex:1;font-family:var(--mono);font-size:12.5px;padding:6px 9px;border:1px solid var(--line-2);border-radius:6px;background:#fff}
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.class-card{border:1px solid var(--line);border-radius:var(--r);padding:18px;background:var(--surface);text-align:left;transition:.16s}
.class-card:hover{border-color:var(--career);transform:translateY(-3px);box-shadow:var(--shadow)}
.class-card .cl{font-family:var(--mono);font-size:11px;color:var(--faint)}
.class-card .cn{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:4px 0 2px}
.class-card .ci{font-size:12.5px;color:var(--muted)}
.cur-item{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 14px;background:var(--surface);margin-bottom:8px}
.cur-item.off{opacity:.55;background:var(--surface-2)}
.cur-item .grow{flex:1;min-width:0}
.cur-item .an{font-weight:600;font-size:14px}
.cur-item .ad{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toggle{position:relative;width:42px;height:24px;border-radius:20px;background:var(--line-2);border:none;transition:.16s;flex:none;cursor:pointer}

          setTimeout(fin,7000); });

      return true;
    }catch(e){ console.warn("FB init 실패→local",e); return false; } }
  const getIn=p=>{let o=local; for(const k of p.split("/")){ if(o==null)return null; o=o[k]; } return o===undefined?null:o;};
  const setIn=(p,v)=>{const ks=p.split("/");let o=local;for(let i=0;i<ks.length-1;i++){o[ks[i]]=o[ks[i]]||{};o=o[ks[i]];} if(v===null)delete o[ks[ks.length-1]];else o[ks[ks.length-1]]=v;};
  const notify=p=>{Object.keys(subs).forEach(q=>{ if(p===q||p.startsWith(q+"/")||q.startsWith(p+"/")) subs[q].forEach(cb=>cb(getIn(q))); });};
  const api={

    ready:()=>readyP,
    subscribe(p,cb){ if(mode==="firebase"){const r=db.ref(p);const h=r.on("value",s=>cb(s.val()));return()=>r.off("value",h);} (subs[p]=subs[p]||new Set()).add(cb); cb(getIn(p)); return()=>subs[p]&&subs[p].delete(cb); },

    async update(p,pt){ if(mode==="firebase")return db.ref(p).update(pt); const c=getIn(p)||{}; setIn(p,{...c,...pt});saveLS();notify(p); },
    async remove(p){ if(mode==="firebase")return db.ref(p).remove(); setIn(p,null);saveLS();notify(p); },
    newKey(){ if(mode==="firebase")return db.ref().push().key; return "k"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function stuContentSig(st){
  st=st||{}; const r=st.records||{}; let s="";
  Object.keys(r).sort().forEach(id=>{const x=r[id]||{}; s+=id+":"+(x.name||"").length+","+(x.subtopic||"").length+","+(x.motivation||"").length+","+(x.content||"").length+","+(x.learned||"").length+","+(x.domain||"")+"|";});
  const c=st.counseling||{}; s+="#"+(c.autoDesign||"").length+","+(c.careerDesign||"").length+","+(c.summary||"").length;
  const b=st.books||{}; s+="#"; ["auto","career"].forEach(d=>{const o=b[d]||{}; Object.keys(o).sort().forEach(k=>{s+=d+k+":"+((o[k].title||"").length)+","+((o[k].activity||"").length)+";";});});
  s+="#"+(st.career||"").length;
  return s;
}
function seenKey(ck){ return "cea3_seen_"+((S.teacher&&S.teacher._id)||S.role||"t")+"_"+ck; }
function loadSeen(ck){ try{return JSON.parse(localStorage.getItem(seenKey(ck))||"{}");}catch(e){return {};} }
function saveSeen(ck,m){ try{localStorage.setItem(seenKey(ck),JSON.stringify(m));}catch(e){} }
function markSeen(ck,sid,sig){ const m=loadSeen(ck); m[sid]=sig; saveSeen(ck,m); }
function seedSeenIfEmpty(ck){ const m=loadSeen(ck); if(Object.keys(m).length) return; const all=S.allStudents||{}; rosterArr(ck).forEach(r=>{ m[r.sid]=stuContentSig(all[r.sid]); }); saveSeen(ck,m); }
function computeChanges(ck){ const all=S.allStudents||{}; const seen=loadSeen(ck); const out=[];
  rosterArr(ck).forEach(r=>{ const sig=stuContentSig(all[r.sid]); if((r.sid in seen) && seen[r.sid]!==sig) out.push({sid:r.sid,name:r.name}); }); return out; }
function ackAllChanges(ck){ const all=S.allStudents||{}; const m=loadSeen(ck); rosterArr(ck).forEach(r=>{ m[r.sid]=stuContentSig(all[r.sid]); }); saveSeen(ck,m); }
let _lastNotifSig="__init__";
function updateChangeNotif(){
  const el=document.getElementById("change-notif"); if(!el) return;
  const ch=computeChanges(S.ck);
  const sig=ch.map(c=>c.sid).join(",");
  if(sig===_lastNotifSig && el.innerHTML) return;   // 변동 학생 집합이 그대로면 배너 다시 안 그림
  _lastNotifSig=sig;
  if(!ch.length){ el.innerHTML='<div class="notif-empty">🔔 새 변동 없음</div>'; return; }
  const names=ch.slice(0,8).map(c=>'<button class="notif-name" data-gosid="'+c.sid+'">'+esc(c.name)+'</button>').join("");
  el.innerHTML='<div class="notif-box"><span class="notif-ic">🔔</span><span class="notif-t">새 변동 '+ch.length+'명</span>'+
    '<div class="notif-names">'+names+(ch.length>8?'<span class="notif-more">+'+(ch.length-8)+'</span>':'')+'</div>'+
    '<button class="btn ghost sm notif-ack">모두 확인</button></div>';
  el.querySelectorAll("[data-gosid]").forEach(b=>b.onclick=()=>{ const sid=b.dataset.gosid; markSeen(S.ck,sid,stuContentSig((S.allStudents||{})[sid])); enterStudent(S.ck,sid,S.role); });
  const ack=el.querySelector(".notif-ack"); if(ack)ack.onclick=()=>{ ackAllChanges(S.ck); if(S.adminTab==="students"){$("#app").innerHTML=viewClass();bindClass();} else updateChangeNotif(); };
}

function uploadSchoolActivitiesExcel(){
  if(typeof XLSX==="undefined"){toast("엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.","err");return;}
  const f=$("#sa-file")&&$("#sa-file").files[0]; const log=$("#sa-uplog");
  if(!f){toast("엑셀 파일을 선택하세요","err");return;}
  const replace=$("#sa-replace")&&$("#sa-replace").checked;
  const rd=new FileReader();
  rd.onload=async e=>{ try{
    const wb=XLSX.read(e.target.result,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{defval:""});
    const pick=(o,keys)=>{ for(const k of Object.keys(o)){ const kk=String(k).replace(/\s/g,""); if(keys.some(x=>kk.includes(x))) return o[k]; } return ""; };
    const rows=[];
    raw.forEach(o=>{ const name=String(pick(o,["활동명","활동","명칭","이름"])).trim(); if(!name)return;
      const domRaw=String(pick(o,["영역","구분","자율진로"])).replace(/\s/g,""); const dom=(domRaw.includes("자율")&&domRaw.includes("진로"))?"자율/진로":(domRaw.includes("진로")?"진로":"자율");
      rows.push({domain:dom, name, content:String(pick(o,["활동설명","설명","내용"])).trim(), org:String(pick(o,["주관","기관"])).trim(), period:String(pick(o,["시행","시기","월","일정"])).trim()});
    });
    if(!rows.length){ if(log)log.textContent="유효한 행을 찾지 못했습니다. 머리글(영역/활동명 등)을 확인하세요."; toast("업로드할 활동이 없습니다","err"); return; }
    const auto=rows.filter(r=>r.domain==="자율").length, career=rows.length-auto;
    const doUpload=async()=>{
      if(replace){
        const ov={}; DEFAULT_ACTIVITIES.forEach(a=>ov[a.id]={removed:true});
        await Store.set("config/defaultOverrides",ov);
        await Store.set("config/schoolActivities",null);
      }
      const add={}; rows.forEach(r=>{ add[Store.newKey()]=r; });
      const cur=replace?{}:(S.schoolActs||{});
      await Store.set("config/schoolActivities",{...cur,...add});
      toast("학교 공통 활동 "+rows.length+"개 업로드 완료","ok");
      if(log)log.textContent="완료: 자율 "+auto+" · 진로 "+career+"개 반영됨"+(replace?" (기존 목록 교체)":" (기존에 추가)");
      $("#sa-file").value="";
    };
    if(replace) openModal("교체 업로드 확인","기존 학교 공통 활동을 모두 지우고 이 파일의 "+rows.length+"개(자율 "+auto+"·진로 "+career+")로 교체합니다. 진행할까요?",doUpload,"교체",true);
    else await doUpload();
  }catch(err){ console.error(err); if(log)log.textContent="파일을 읽지 못했습니다: "+(err&&err.message||err); toast("엑셀을 읽지 못했습니다","err"); } };
  rd.readAsArrayBuffer(f);
}

  document.querySelectorAll("[data-delt]").forEach(b=>b.onclick=()=>openModal("교사 삭제","이 교사 계정을 삭제할까요? (학생 기록은 유지됩니다)",async()=>{await Store.remove("config/teachers/"+b.dataset.delt);toast("삭제됨","ok");},"삭제",true));

  document.querySelectorAll("[data-delsa]").forEach(b=>b.onclick=()=>openModal("공통 활동 삭제","이 학교 공통 활동을 삭제할까요? 모든 반의 목록에서 사라집니다.",async()=>{await Store.remove("config/schoolActivities/"+b.dataset.delsa);toast("삭제됨","ok");},"삭제",true));
  document.querySelectorAll("[data-editsa]").forEach(b=>b.onclick=()=>editSchoolActivity(b.dataset.editsa));
  document.querySelectorAll("[data-editd]").forEach(b=>b.onclick=()=>editDefaultActivity(b.dataset.editd));
  document.querySelectorAll("[data-deld]").forEach(b=>b.onclick=()=>openModal("기본 활동 삭제","이 기본 활동을 모든 반에서 숨길까요? 나중에 ‘복원’으로 되돌릴 수 있습니다.",async()=>{await Store.update("config/defaultOverrides/"+b.dataset.deld,{removed:true});toast("삭제됨 (복원 가능)","ok");},"삭제",true));
  document.querySelectorAll("[data-restored]").forEach(b=>b.onclick=async()=>{await Store.update("config/defaultOverrides/"+b.dataset.restored,{removed:null});toast("복원됨","ok");});
  const tpl=$("#sa-tpl"); if(tpl)tpl.onclick=downloadActivityTemplate;
  const up=$("#sa-upload"); if(up)up.onclick=uploadSchoolActivitiesExcel;
}
function editDefaultActivity(id){
  const base=DEF_BY_ID[id]; if(!base)return; const cur={...base,...((S.defOverrides||{})[id]||{})};
  const body='<div class="field"><label class="eyebrow" style="display:block;margin-bottom:6px">영역</label>'+

    '<div class="field"><label class="eyebrow" style="display:block;margin:10px 0 6px">활동명</label><input class="inp" id="ed-name" value="'+esc(cur.name||"")+'"></div>'+

function editSchoolActivity(id){

    '<div class="field"><label class="eyebrow" style="display:block;margin:10px 0 6px">활동명</label><input class="inp" id="es-name" value="'+esc(a.name||"")+'"></div>'+
    '<div class="field"><label class="eyebrow" style="display:block;margin:10px 0 6px">활동 설명</label><textarea class="ta" id="es-content">'+esc(a.content||"")+'</textarea></div>';

function editTeacher(tid){
  const t=S.teachers[tid]; if(!t)return;

    '<div class="field"><label class="eyebrow" style="display:block;margin:10px 0 6px">담당 학급</label>'+

function openSelectClass(cb){
  const body='<select class="select" id="sel-ck"><option value="">— 반 선택 —</option>'+CLASS_KEYS.map(ck=>'<option value="'+ck+'">'+esc(classLabel(ck))+'</option>').join("")+'</select>';

function doPrint(mode){
  mode=mode||"full";
  const r=rosterOf(S.ck,S.sid); const recs=recordsSorted();
  const b=(S.student&&S.student.books)||{}; const c=(S.student&&S.student.counseling)||{};
  const career=(S.student&&S.student.career)||"";
  const today=new Date().toLocaleDateString("ko-KR");
  const dash='<span class="p-empty">—</span>';
  const head='<div class="p-h"><div class="p-h-l"><div class="p-kick">'+esc(SCHOOL_GRADE)+' 창의적 체험활동</div>'+
    '<div class="pt">'+(mode==="counsel"?"자율진로활동 상담 기록":"활동 기록 및 상담")+'</div></div>'+
    '<div class="p-h-r"><table class="p-meta"><tr><td>학급</td><th>'+esc(classLabel(S.ck))+'</th><td>번호</td><th>'+String(r?r.no:0).padStart(2,"0")+'</th></tr>'+
    '<tr><td>이름</td><th>'+esc(r?r.name:"")+'</th><td>출력일</td><th>'+today+'</th></tr></table></div></div>';
  const careerBox='<div class="p-career"><span class="p-career-l">진로 희망</span><span class="p-career-v">'+(esc(career)||dash)+'</span></div>';
  const counselBox='<div class="p-counsel">'+
      '<div class="pcrow"><div class="pck">자율 활동 상담</div><div class="pcv">'+(nl2br(c.autoDesign)||dash)+'</div></div>'+
      '<div class="pcrow"><div class="pck">진로 활동 상담</div><div class="pcv">'+(nl2br(c.careerDesign)||dash)+'</div></div>'+
      '<div class="pcrow"><div class="pck">종합 소견</div><div class="pcv">'+(nl2br(c.summary)||dash)+'</div></div></div>';

  let inner=head+careerBox;
  if(mode==="full"){
    const domChip=d=>'<span class="p-badge '+domainClass(d)+'">'+esc(d||"자율")+'</span>';
    const recBlocks=recs.length?recs.map((rec,i)=>'<div class="p-rec"><div class="prt">'+String(i+1).padStart(2,"0")+'. '+esc(rec.name||"")+' '+domChip(rec.domain)+'</div>'+
      '<table class="p-fields"><tr><td class="k">세부 주제</td><td>'+(nl2br(rec.subtopic)||dash)+'</td></tr><tr><td class="k">동기·연계</td><td>'+(nl2br(rec.motivation)||dash)+'</td></tr>'+
      '<tr><td class="k">활동 내용</td><td>'+(nl2br(rec.content)||dash)+'</td></tr><tr><td class="k">배운 점</td><td>'+(nl2br(rec.learned)||dash)+'</td></tr></table></div>').join(""):'<div class="p-empty" style="padding:8px 2px">기록된 활동이 없습니다.</div>';
    const bookRows=list=>{const a=Object.values(list||{}).filter(x=>x&&(x.title||x.activity));return a.length?a.map(x=>'<tr><td>'+esc(x.title||"")+'</td><td>'+esc(x.activity||"")+'</td></tr>').join(""):'<tr><td colspan="2" class="p-empty">등록 없음</td></tr>';};
    inner+='<div class="p-sec"><h3>활동 기록</h3>'+recBlocks+'</div>'+
      '<div class="p-sec p-book"><h3>도서 목록 · 연계성</h3>'+
        '<table><thead><tr><th style="width:42%">자율 도서</th><th>연계 활동</th></tr></thead><tbody>'+bookRows(b.auto)+'</tbody></table>'+
        '<table style="margin-top:6px"><thead><tr><th style="width:42%">진로 도서</th><th>연계 활동</th></tr></thead><tbody>'+bookRows(b.career)+'</tbody></table></div>'+
      '<div class="p-sec"><h3>자율진로활동 상담</h3>'+counselBox+'</div>';
  } else {
    inner+='<div class="p-sec"><h3>자율진로활동 상담</h3>'+counselBox+'</div>';
  }
  $("#print-root").innerHTML='<div class="p-doc">'+inner+'<div class="p-foot">본 문서는 창의적 체험활동 기록·상담 워크스페이스에서 출력되었습니다.</div></div>';
  window.print();
}
function printRoster(){
  const ros=S.roster||{};
  const rows=rosterArr(S.ck).map(r=>{const pw=(ros[r.sid]&&ros[r.sid].pw)||"";
    return '<tr><td class="rn">'+String(r.no).padStart(2,"0")+'</td><td class="rnm">'+esc(r.name)+'</td><td class="rpw">'+esc(pw||"—")+'</td></tr>';}).join("");
  $("#print-root").innerHTML='<div class="p-doc">'+
    '<div class="p-h"><div class="p-h-l"><div class="p-kick">'+esc(SCHOOL_GRADE)+' 창의적 체험활동</div>'+
      '<div class="pt">'+esc(classLabel(S.ck))+' 로그인 안내</div></div>'+
      '<div class="p-h-r"><table class="p-meta"><tr><td>학급</td><th>'+esc(classLabel(S.ck))+'</th></tr><tr><td>출력일</td><th>'+new Date().toLocaleDateString("ko-KR")+'</th></tr></table></div></div>'+
    '<p class="p-note">아래는 학생별 초기 로그인 비밀번호입니다. 학생은 로그인 후 <b>비밀번호 변경</b>으로 직접 바꿀 수 있습니다. 개인정보이니 배부 시 유의해 주세요.</p>'+
    '<table class="p-roster"><thead><tr><th>번호</th><th>이름</th><th>비밀번호</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="p-foot">로그인 주소에서 반 → 이름 선택 후 위 비밀번호로 입장합니다.</div></div>';
  window.print();
}
function parseDeepLink(){
  try{ const q=new URLSearchParams(location.search);
    if(q.get("open")!=="student") return null;
    const cls=q.get("cls"), no=q.get("no"), name=q.get("name");
    const ck="c"+String(cls||"").replace(/[^0-9]/g,""); if(ck==="c") return null;
    const arr=rosterArr(ck); if(!arr.length) return null;
    let sid = no? ck+"-"+String(parseInt(no,10)).padStart(2,"0") : null;
    if(sid && !arr.some(r=>r.sid===sid)) sid=null;
    if(!sid && name){ const hit=arr.find(r=>r.name===String(name).trim()); if(hit) sid=hit.sid; }
    return sid? {ck,sid} : null;
  }catch(e){ return null; }
}
function openDeepStudent(dl){
  if(!dl) return;
  if(S.role==="super"){ enterStudent(dl.ck,dl.sid,"super"); return; }
  if(S.role==="teacher"){
    if(S.teacher&&S.teacher.classes&&S.teacher.classes[dl.ck]) enterStudent(dl.ck,dl.sid,"teacher");
    else { enterTeacher(); toast("이 학생은 담당 학급이 아닙니다.","err"); }
  }
}
function openModal(title,body,onOk,okLabel,danger){
  okLabel=okLabel||"확인";
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML='<div class="modal"><div class="mh"><h3>'+esc(title)+'</h3></div><div class="mb">'+body+'</div>'+
    '<div class="mf"><button class="btn ghost" id="m-cancel">취소</button><button class="btn '+(danger?"danger":"primary")+'" id="m-ok" '+(danger?'style="background:#fbeaea;border-color:#f0cfcf"':"")+'>'+esc(okLabel)+'</button></div></div>';
  document.body.appendChild(ov); const close=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)close();};
  ov.querySelector("#m-cancel").onclick=close;
  ov.querySelector("#m-ok").onclick=async()=>{ if(onOk){ const r=await onOk(); if(r===false) return; } close(); };
  return ov;
}
function askSuperPassword(){
  const ov=openModal("관리자 로그인","<label class='eyebrow'>비밀번호</label><input class='inp' id='sp' type='password' placeholder='관리자 비밀번호'>",null,"입장");
  const ok=ov.querySelector("#m-ok"), sp=ov.querySelector("#sp"); setTimeout(()=>sp&&sp.focus(),50);
  const go=()=>{ if(sp.value===SUPER_PASSWORD){ov.remove();enterSuper();} else {toast("비밀번호가 올바르지 않습니다","err");sp.value="";sp.focus();} };
  ok.onclick=go; sp.onkeydown=e=>{if(e.key==="Enter")go();};
}
function wireGlobal(){
  const gs=$("#go-stu"); if(gs)gs.onclick=()=>{clearSubs();Object.assign(S,{view:"stu-login",role:null,loginClass:null,loginName:null});render();};
  const gt=$("#go-tea"); if(gt)gt.onclick=()=>{clearSubs();Object.assign(S,{view:"tea-login",role:null});render();};
  const gp=$("#go-sup"); if(gp)gp.onclick=askSuperPassword;
}
function resume(){
  const dl=parseDeepLink(); const s=loadSession();
  if(dl){ // 진학→창체 딥링크: 교사/관리자만 열람 가능
    if(s&&s.role==="super"){ S.role="super"; saveSession(); enterStudent(dl.ck,dl.sid,"super"); return; }
    if(s&&s.role==="teacher"&&s.tid){
      Store.get("config/teachers/"+s.tid).then(t=>{ if(t){ S.teacher={_id:s.tid,...t}; S.role="teacher"; saveSession();
          Store.get("config/classes").then(cc=>{ S.classCfg=cc||{}; openDeepStudent(dl); });
        } else { S._pendingDL=dl; S.view="tea-login"; render(); } });
      return;
    }
    S._pendingDL=dl; S.role=null; S.view="tea-login"; render(); return; // 로그인 후 자동 이동
  }
  if(!s||!s.role){ render(); return; }
  if(s.role==="student"&&s.ck&&s.sid){ enterStudent(s.ck,s.sid,"student"); return; }
  if(s.role==="super"){ enterSuper(); return; }
  if(s.role==="teacher"&&s.tid){
    Store.get("config/teachers/"+s.tid).then(t=>{ if(t){S.teacher={_id:s.tid,...t}; S.role="teacher";
      Store.get("config/classes").then(cc=>{S.classCfg=cc||{}; if(s.ck){enterClass(s.ck);} else {enterTeacher();}});
    } else { render(); }});
    return;
  }
  render();
}
window.addEventListener("popstate", ()=>{ if(S.view!=="home"){ goBack(); pushHist(); } });
if(Store.mode()==="firebase"){ $("#app").innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--mono);font-size:13px">연결 중…</div>'; }
Store.ready().then(()=>{ resume(); pushHist(); });
